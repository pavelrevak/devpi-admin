<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>devpi admin</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app-view">
        <header class="app-header">
            <div class="header-inner">
                <a href="#" class="logo">devpi admin</a>
                <button id="menu-toggle" class="menu-toggle" aria-label="Menu">&#9776;</button>
                <div id="mobile-menu-panel" class="mobile-menu-panel">
                    <nav id="main-nav">
                        <a href="#" class="nav-link">Status</a>
                        <a href="#indexes" class="nav-link">Indexes</a>
                        <a href="#users" class="nav-link" id="nav-users">Users</a>
                    </nav>
                    <div class="header-right">
                        <button id="login-btn" class="btn btn-small" hidden>Login</button>
                        <button id="logout-btn" class="btn btn-small user-btn" hidden></button>
                        <button id="theme-toggle" class="theme-btn" aria-label="Toggle theme">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </header>
        <main id="content" class="content"></main>
    </div>

    <div id="modal-overlay" class="modal-overlay" hidden>
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-title"></h2>
                <button id="modal-close" class="modal-close">&times;</button>
            </div>
            <div id="modal-body" class="modal-body"></div>
            <div id="modal-error" class="error" hidden></div>
            <div id="modal-footer" class="modal-footer"></div>
        </div>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/marked.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
